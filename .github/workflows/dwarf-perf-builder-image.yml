name: Build DWARF Perf Builder Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/swananan/ghostscope-dwarf-perf-builder
          tags: |
            type=raw,value=ubuntu24.04-llvm18-rust1.88
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/dwarf-perf-builder/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=dwarf-perf-builder
          cache-to: type=gha,mode=max,scope=dwarf-perf-builder
