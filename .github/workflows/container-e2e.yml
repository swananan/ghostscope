name: Container E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  container-e2e-smoke:
    name: Container E2E (${{ matrix.name }})
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: private
            ghostscope_sandbox: docker-private
            target_sandbox: docker-private
          - name: host
            ghostscope_sandbox: docker-host
            target_sandbox: docker-host

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run container topology smoke
        env:
          E2E_CONTAINER_IMAGE: ghcr.io/swananan/ghostscope-build:ubuntu20.04-llvm18.1.8
          E2E_GHOSTSCOPE_SANDBOX: ${{ matrix.ghostscope_sandbox }}
          E2E_TARGET_SANDBOX: ${{ matrix.target_sandbox }}
          E2E_SHARE_SANDBOX: "1"
        run: |
          for test_case in \
            test_invalid_pid_handling \
            test_correct_pid_filtering \
            test_pid_specificity_with_multiple_processes
          do
            sudo env \
              E2E_CONTAINER_IMAGE="$E2E_CONTAINER_IMAGE" \
              E2E_GHOSTSCOPE_SANDBOX="$E2E_GHOSTSCOPE_SANDBOX" \
              E2E_TARGET_SANDBOX="$E2E_TARGET_SANDBOX" \
              E2E_SHARE_SANDBOX="$E2E_SHARE_SANDBOX" \
              cargo test --all-features --test script_execution "$test_case" -- --nocapture
          done
