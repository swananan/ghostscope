[graph]
targets = ["x86_64-unknown-linux-gnu"]
all-features = true

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
unmaintained = "workspace"
unsound = "all"
unused-ignored-advisory = "warn"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "simplest-path"
allow-wildcard-paths = true
skip = [
    { crate = "hashbrown@0.16.1", reason = "gimli and ratatui-core currently use this alongside aya/indexmap's newer hashbrown" },
    { crate = "object@0.36.7", reason = "ghostscope-dwarf/process use the workspace object version while aya uses a newer transitive object" },
    { crate = "thiserror@1.0.69", reason = "inkwell 0.6 still depends on thiserror 1.x" },
    { crate = "thiserror-impl@1.0.69", reason = "proc-macro companion for inkwell's thiserror 1.x dependency" },
]

[licenses]
confidence-threshold = 0.93
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "GPL-3.0-only",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "rev"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/aya-rs/aya"]
